<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nova Search</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  min-height: 100vh;
}

/* APP */
.app {
  text-align: center;
  max-width: 700px;
  margin: auto;
  padding: 40px 20px;
}

/* HEADER */
header h1 {
  font-size: 60px;
  background: linear-gradient(90deg, #60a5fa, #a78bfa, #34d399);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

header p {
  opacity: 0.7;
  margin-top: 10px;
}

/* SEARCH */
.search-container {
  margin-top: 40px;
}

.search-box {
  position: relative;
  display: flex;
  justify-content: center;
  gap: 10px;
}

input {
  width: 70%;
  padding: 15px;
  border-radius: 50px;
  border: none;
  outline: none;
  font-size: 16px;
}

button {
  padding: 15px 25px;
  border-radius: 50px;
  border: none;
  background: linear-gradient(90deg, #3b82f6, #8b5cf6);
  color: white;
  cursor: pointer;
}

/* SUGGESTIONS */
.suggestions {
  position: absolute;
  top: 60px;
  width: 70%;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-radius: 10px;
  display: none;
  text-align: left;
}

.suggestions div {
  padding: 10px;
  cursor: pointer;
}

.suggestions div:hover {
  background: rgba(255,255,255,0.2);
}

/* RESULT */
#result {
  margin-top: 30px;
}

/* FOOTER */
footer {
  margin-top: 60px;
  font-size: 12px;
  opacity: 0.5;
}
</style>
</head>

<body>

<div class="app">

  <header>
    <h1>Nova Search</h1>
    <p>Fast. Clean. Simple.</p>
  </header>

  <div class="search-container">
    <div class="search-box">

      <input id="searchBox" type="text" placeholder="Search Wikipedia..." oninput="showSuggestions()">

      <button onclick="search()">Search</button>

      <div id="suggestions" class="suggestions"></div>

    </div>
  </div>

  <div id="result"></div>

  <footer>
    <p>Built by Fabrice 🚀</p>
  </footer>

</div>

<script>
const data = [
  "Roblox","Minecraft","Fortnite","Google","YouTube",
  "ChatGPT","Kenya","Aviation","Technology","Space",
  "Football","Coding","JavaScript","Python"
];

// AUTOCOMPLETE
function showSuggestions() {
  const input = document.getElementById("searchBox").value.toLowerCase();
  const box = document.getElementById("suggestions");

  box.innerHTML = "";

  if (!input) {
    box.style.display = "none";
    return;
  }

  const results = data.filter(item =>
    item.toLowerCase().includes(input)
  );

  results.forEach(item => {
    const div = document.createElement("div");
    div.innerText = item;

    div.onclick = () => {
      document.getElementById("searchBox").value = item;
      box.style.display = "none";
      search();
    };

    box.appendChild(div);
  });

  box.style.display = results.length ? "block" : "none";
}

// WIKIPEDIA SEARCH
async function search() {
  const query = document.getElementById("searchBox").value.trim();
  const result = document.getElementById("result");

  if (!query) {
    result.innerHTML = "Type something first 🙂";
    return;
  }

  result.innerHTML = "Searching Wikipedia... 🔍";

  try {
    const response = await fetch(
      `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`
    );

    const data = await response.json();

    if (!data || !data.extract) {
      result.innerHTML = `<h3>No results for "${query}"</h3>`;
      return;
    }

    result.innerHTML = `
      <h2>${data.title}</h2>
      <p>${data.extract}</p>
      <a href="${data.content_urls.desktop.page}" target="_blank">
        Open full article →
      </a>
    `;

  } catch (error) {
    result.innerHTML = "Error loading results 😕";
  }
}
</script>

</body>
</html>
