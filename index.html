<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fabrice Search</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 25px;
    }

    input {
      padding: 14px;
      width: 300px;
      border-radius: 25px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    button {
      margin-top: 15px;
      padding: 12px 24px;
      border-radius: 25px;
      border: none;
      background: #3b82f6;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #2563eb;
      transform: scale(1.05);
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      opacity: 0.9;
      text-align: center;
    }

    a {
      color: #60a5fa;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <h1>Fabrice Search</h1>

  <input id="searchBox" type="text" placeholder="Search anything...">

  <button onclick="search()">Search</button>

  <p id="result"></p>

  <script>
    function search() {
      const value = document.getElementById("searchBox").value.trim();
      const result = document.getElementById("result");

      if (value === "") {
        result.innerText = "Type something first 🙂";
        return;
      }

      result.innerHTML = `
        Searching for: <b>${value}</b><br><br>
        <a href="https://www.google.com/search?q=${encodeURIComponent(value)}" target="_blank">
          Click here to view real Google results 🔍
        </a>
      `;
    }
  </script>

</body>
</html>
