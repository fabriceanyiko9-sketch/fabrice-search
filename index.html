<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nova Search</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #0f172a;
  color: white;
}

/* TOP BAR */
header {
  text-align: center;
  padding: 40px 20px 10px;
}

header h1 {
  font-size: 50px;
  background: linear-gradient(90deg, #60a5fa, #a78bfa, #34d399);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* SEARCH BAR */
.search-container {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.search-box {
  display: flex;
  width: 600px;
  max-width: 90%;
  gap: 10px;
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 30px;
  border: none;
  outline: none;
  font-size: 16px;
}

button {
  padding: 14px 20px;
  border-radius: 30px;
  border: none;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

/* RESULTS */
#result {
  max-width: 700px;
  margin: 40px auto;
  padding: 0 20px;
}

.result-item {
  margin-bottom: 25px;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
}

.result-item a {
  color: #60a5fa;
  font-size: 20px;
  text-decoration: none;
}

.result-item p {
  opacity: 0.8;
  margin-top: 8px;
}

/* FOOTER */
footer {
  text-align: center;
  font-size: 12px;
  opacity: 0.5;
  margin-top: 60px;
  padding-bottom: 30px;
}
</style>
</head>

<body>

<header>
  <h1>Nova Search</h1>
</header>

<div class="search-container">
  <div class="search-box">
    <input id="searchBox" placeholder="Search anything...">
    <button onclick="search()">Search</button>
  </div>
</div>

<div id="result"></div>

<footer>
  Built by Fabrice 🚀
</footer>

<script>
async function search() {
  const query = document.getElementById("searchBox").value.trim();
  const result = document.getElementById("result");

  if (!query) {
    result.innerHTML = "Type something first 🙂";
    return;
  }

  result.innerHTML = "Searching Wikipedia... 🔍";

  try {
    // Wikipedia SEARCH API (MULTIPLE RESULTS)
    const response = await fetch(
      `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*`
    );

    const data = await response.json();
    const results = data.query.search;

    if (!results.length) {
      result.innerHTML = `<h3>No results found for "${query}"</h3>`;
      return;
    }

    result.innerHTML = "";

    results.forEach(item => {
      const title = item.title;
      const snippet = item.snippet.replace(/<\/?span[^>]*>/g, "");

      const url = `https://en.wikipedia.org/wiki/${encodeURIComponent(title)}`;

      result.innerHTML += `
        <div class="result-item">
          <a href="${url}" target="_blank">${title}</a>
          <p>${snippet}...</p>
        </div>
      `;
    });

  } catch (error) {
    result.innerHTML = "Error loading results 😕";
  }
}
</script>

</body>
</html>
