<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nova AI Search Engine</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #0f172a;
  color: white;
}

/* HEADER */
header {
  text-align: center;
  padding: 35px 20px 10px;
}

header h1 {
  font-size: 52px;
  background: linear-gradient(90deg, #60a5fa, #a78bfa, #34d399);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* SEARCH AREA */
.search-container {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.search-box {
  position: relative;
  display: flex;
  width: 650px;
  max-width: 90%;
  gap: 10px;
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 30px;
  border: none;
  outline: none;
  font-size: 16px;
}

button {
  padding: 14px 20px;
  border-radius: 30px;
  border: none;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

/* SUGGESTIONS */
.suggestions {
  position: absolute;
  top: 55px;
  width: 70%;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-radius: 10px;
  display: none;
  text-align: left;
  z-index: 10;
}

.suggestions div {
  padding: 10px;
  cursor: pointer;
}

.suggestions div:hover {
  background: rgba(255,255,255,0.2);
}

/* RESULTS */
#result {
  max-width: 750px;
  margin: 40px auto;
  padding: 0 20px;
}

.result-item {
  margin-bottom: 18px;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
}

.result-item a {
  color: #60a5fa;
  font-size: 18px;
  text-decoration: none;
}

.result-item p {
  opacity: 0.8;
  margin-top: 6px;
}

/* FOOTER */
footer {
  text-align: center;
  font-size: 12px;
  opacity: 0.5;
  margin-top: 60px;
  padding-bottom: 30px;
}
</style>
</head>

<body>

<header>
  <h1>Nova AI Search</h1>
</header>

<div class="search-container">
  <div class="search-box">

    <input id="searchBox" placeholder="Search anything..." oninput="showSuggestions()">

    <button onclick="search()">Search</button>

    <div id="suggestions" class="suggestions"></div>

  </div>
</div>

<div id="result"></div>

<footer>
  Built by Fabrice 🚀
</footer>

<script>
const suggestionsData = [
  "Roblox","Minecraft","Fortnite","Google","YouTube",
  "Kenya","Aviation","Space","Technology","AI",
  "Football","Coding","Python","JavaScript"
];

/* AUTOCOMPLETE */
function showSuggestions() {
  const input = document.getElementById("searchBox").value.toLowerCase();
  const box = document.getElementById("suggestions");

  box.innerHTML = "";

  if (!input) {
    box.style.display = "none";
    return;
  }

  const matches = suggestionsData.filter(item =>
    item.toLowerCase().includes(input)
  );

  matches.forEach(item => {
    const div = document.createElement("div");
    div.innerText = item;

    div.onclick = () => {
      document.getElementById("searchBox").value = item;
      box.style.display = "none";
      search();
    };

    box.appendChild(div);
  });

  box.style.display = matches.length ? "block" : "none";
}

/* MAIN SEARCH ENGINE */
async function search() {
  const query = document.getElementById("searchBox").value.trim();
  const result = document.getElementById("result");

  if (!query) {
    result.innerHTML = "Type something first 🙂";
    return;
  }

  result.innerHTML = "AI is searching the web... 🤖🔍";

  try {
    // Wikipedia search
    const wikiRes = await fetch(
      `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*`
    );

    const wikiData = await wikiRes.json();
    let results = wikiData?.query?.search || [];

    // DuckDuckGo instant answer
    const ddgRes = await fetch(
      `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_redirect=1`
    );

    const ddgData = await ddgRes.json();

    let output = "";

    // AI quick answer
    if (ddgData.AbstractText) {
      output += `
        <div class="result-item">
          <h3>AI Answer 🤖</h3>
          <p>${ddgData.AbstractText}</p>
        </div>
      `;
    } else {
      output += aiBrain(query);
    }

    // Rank results
    results = results.map(item => {
      let score = 0;

      if (item.title.toLowerCase().includes(query.toLowerCase())) score += 10;
      if (item.snippet.toLowerCase().includes(query.toLowerCase())) score += 5;

      return { ...item, score };
    });

    results.sort((a, b) => b.score - a.score);

    // Render results
    results.slice(0, 6).forEach(item => {
      const title = item.title;
      const snippet = item.snippet.replace(/<\/?span[^>]*>/g, "");
      const url = `https://en.wikipedia.org/wiki/${encodeURIComponent(title)}`;

      output += `
        <div class="result-item">
          <a href="${url}" target="_blank">${title}</a>
          <p>${snippet}...</p>
        </div>
      `;
    });

    result.innerHTML = output;

  } catch (error) {
    result.innerHTML = aiBrain(query);
  }
}

/* AI BRAIN */
function aiBrain(query) {
  const q = query.toLowerCase();

  if (q.includes("roblox")) {
    return `<div class="result-item"><h3>AI Answer 🤖</h3><p>Roblox is a platform where users create and play games.</p></div>`;
  }

  if (q.includes("kenya")) {
    return `<div class="result-item"><h3>AI Answer 🤖</h3><p>Kenya is an East African country known for Nairobi and wildlife.</p></div>`;
  }

  if (q.includes("aviation")) {
    return `<div class="result-item"><h3>AI Answer 🤖</h3><p>Aviation is the science of aircraft and flight.</p></div>`;
  }

  return `
    <div class="result-item">
      <h3>AI Answer 🤖</h3>
      <p>No direct data found, but this is a general topic. Try refining your search.</p>
    </div>
  `;
}
</script>

</body>
</html>
