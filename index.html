<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hill Racer Deluxe 🚗💨</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(#38bdf8, #0f172a);
  font-family: Arial;
  color: white;
}

canvas {
  display: block;
}

/* HUD */
#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 16px;
  background: rgba(0,0,0,0.3);
  padding: 10px;
  border-radius: 10px;
}

/* GAME OVER */
#gameOver {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  display: none;
  text-align: center;
}

button {
  padding: 10px 20px;
  margin-top: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="hud">
  <div id="dist">Distance: 0</div>
  <div id="coins">Coins: 0</div>
  <div id="fuel">Fuel: 100</div>
</div>

<div id="gameOver">
  <h1 id="msg"></h1>
  <button onclick="location.reload()">Restart</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* CAR */
let car = {
  x: 100,
  y: 200,
  vx: 0,
  vy: 0,
  angle: 0
};

/* WORLD */
let terrain = [];
let coins = [];
let distance = 0;
let fuel = 100;
let gameRunning = true;
let coinCount = 0;

/* GENERATE TERRAIN (SMOOTH HILLS) */
for (let i = 0; i < 3000; i++) {
  terrain.push({
    x: i * 40,
    y: 450 + Math.sin(i * 0.2) * 80 + Math.sin(i * 0.05) * 120
  });

  // coins randomly
  if (Math.random() < 0.1) {
    coins.push({ x: i * 40, collected: false });
  }
}

/* CONTROLS */
let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

/* PHYSICS LOOP */
function update() {
  if (!gameRunning) return;

  // acceleration
  if (keys["ArrowRight"]) car.vx += 0.25;
  if (keys["ArrowLeft"]) car.vx -= 0.25;

  // physics
  car.vy += 0.6; // gravity
  car.x += car.vx;
  car.y += car.vy;

  car.vx *= 0.97;

  // terrain collision
  let groundY = getGround(car.x);

  if (car.y > groundY) {
    car.y = groundY;
    car.vy *= -0.2; // suspension bounce
  }

  // slope angle
  car.angle = Math.atan2(
    getGround(car.x + 20) - getGround(car.x - 20),
    40
  );

  // fuel drain
  if (keys["ArrowRight"] || keys["ArrowLeft"]) fuel -= 0.04;

  if (fuel <= 0) endGame("Out of Fuel ⛽");

  // crash
  if (Math.abs(car.angle) > 1.4) {
    endGame("Crash 💥");
  }

  // coins
  coins.forEach(c => {
    if (!c.collected && Math.abs(car.x - c.x) < 30) {
      c.collected = true;
      coinCount++;
    }
  });

  distance = Math.floor(car.x / 10);

  updateHUD();
  draw();

  requestAnimationFrame(update);
}

/* TERRAIN HEIGHT */
function getGround(x) {
  let i = Math.floor(x / 40);
  if (i < 0 || i >= terrain.length) return 500;
  return terrain[i].y;
}

/* DRAW */
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // SKY GRADIENT
  ctx.fillStyle = "#38bdf8";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // CLOUDS (parallax)
  ctx.fillStyle = "white";
  for (let i = 0; i < 10; i++) {
    ctx.beginPath();
    ctx.arc((i*200 - car.x*0.2)%canvas.width, 100 + i*10, 30, 0, Math.PI*2);
    ctx.fill();
  }

  // GROUND
  ctx.fillStyle = "#14532d";
  ctx.beginPath();

  for (let p of terrain) {
    ctx.lineTo(p.x - car.x + 200, p.y);
  }

  ctx.lineTo(canvas.width, canvas.height);
  ctx.fill();

  // COINS
  coins.forEach(c => {
    if (!c.collected) {
      ctx.fillStyle = "gold";
      ctx.beginPath();
      ctx.arc(c.x - car.x + 200, getGround(c.x)-20, 8, 0, Math.PI*2);
      ctx.fill();
    }
  });

  // CAR (simple but better shape)
  ctx.save();
  ctx.translate(200, car.y);
  ctx.rotate(car.angle);

  ctx.fillStyle = "red";
  ctx.fillRect(-25, -10, 50, 20);

  // wheels
  ctx.fillStyle = "black";
  ctx.fillRect(-20, 10, 15, 10);
  ctx.fillRect(5, 10, 15, 10);

  ctx.restore();
}

/* HUD */
function updateHUD() {
  document.getElementById("dist").innerText = "Distance: " + distance;
  document.getElementById("coins").innerText = "Coins: " + coinCount;
  document.getElementById("fuel").innerText = "Fuel: " + Math.floor(fuel);
}

/* GAME OVER */
function endGame(msg) {
  gameRunning = false;
  document.getElementById("gameOver").style.display = "block";
  document.getElementById("msg").innerText = msg;
}

update();
</script>

</body>
</html>
