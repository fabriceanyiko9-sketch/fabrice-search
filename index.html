<!DOCTYPE html>
<html>
<head>
  <title>Fabrice Search</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 30px;
    }

    input {
      padding: 15px;
      width: 300px;
      border-radius: 25px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    button {
      margin-top: 15px;
      padding: 12px 25px;
      border-radius: 25px;
      border: none;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #2563eb;
      transform: scale(1.05);
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <h1>Fabrice Search</h1>

  <input type="text" id="searchBox" placeholder="Search something...">
  <br>
  <button onclick="search()">Search</button>

  <p id="result"></p>

  <script>
    function search() {
      const input = document.getElementById("searchBox").value;

      if (!input) {
        document.getElementById("result").innerText = "Type something first 🙂";
        return;
      }

      document.getElementById("result").innerText =
        "You searched for: " + input;
    }
  </script>

</body>
</html>
