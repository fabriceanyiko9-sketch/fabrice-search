<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nova Flight Simulator ✈️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  color: white;
}

/* WORLD */
#world {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(#1e3a8a 60%, #14532d 60%);
}

/* RUNWAY */
#runway {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 40px;
  background: #333;
}

/* PLANE */
#plane {
  position: absolute;
  left: 120px;
  width: 60px;
  height: 30px;
  background: cyan;
  border-radius: 5px;
}

/* CLOUD */
.cloud {
  position: absolute;
  width: 100px;
  height: 50px;
  background: white;
  border-radius: 50px;
  opacity: 0.3;
}

/* HUD */
#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 14px;
}

#hud span {
  display: block;
  margin-bottom: 4px;
}

/* GAME OVER */
#gameOver {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  display: none;
  text-align: center;
}

button {
  padding: 10px 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="world"></div>
<div id="runway"></div>
<div id="plane"></div>

<div id="hud">
  <span id="speed">Speed: 0</span>
  <span id="alt">Altitude: 0</span>
  <span id="fuel">Fuel: 100%</span>
  <span id="dist">Distance: 0m</span>
</div>

<div id="gameOver">
  <h1 id="msg"></h1>
  <button onclick="restart()">Restart</button>
</div>

<script>
const plane = document.getElementById("plane");

let y = window.innerHeight - 70;
let velocity = 0;
let pitch = 0;
let throttle = 0;
let speed = 0;

let fuel = 100;
let distance = 0;
let gameRunning = true;

// wind effect
let wind = (Math.random() - 0.5) * 0.2;

/* CONTROLS */
document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp") pitch -= 2;
  if (e.key === "ArrowDown") pitch += 2;
  if (e.key === "ArrowRight") throttle += 0.3;
  if (e.key === "ArrowLeft") throttle -= 0.3;
});

/* CLOUDS */
function createCloud() {
  const cloud = document.createElement("div");
  cloud.classList.add("cloud");
  cloud.style.top = Math.random() * 300 + "px";
  document.body.appendChild(cloud);

  let x = window.innerWidth;

  function move() {
    if (!gameRunning) return;

    x -= 1;
    cloud.style.left = x + "px";

    if (x < -100) cloud.remove();
    else requestAnimationFrame(move);
  }

  move();
}

setInterval(createCloud, 2000);

/* GAME LOOP */
function gameLoop() {
  if (!gameRunning) return;

  // clamp controls
  pitch = Math.max(-20, Math.min(20, pitch));
  throttle = Math.max(0, Math.min(6, throttle));

  speed = throttle;

  // physics
  let lift = speed * (-pitch * 0.05);
  velocity += 0.3 + wind - lift;
  y += velocity;

  // fuel & distance
  fuel -= 0.02 * throttle;
  distance += speed;

  // ground collision
  if (y > window.innerHeight - 40) {
    if (speed > 3 && Math.abs(velocity) < 4) {
      endGame("Smooth Landing 🛬");
    } else {
      endGame("Crash 💥");
    }
  }

  if (fuel <= 0) endGame("Out of Fuel ⛽");

  y = Math.max(0, y);

  // apply movement
  plane.style.top = y + "px";
  plane.style.transform = `rotate(${pitch}deg)`;

  // HUD updates
  document.getElementById("speed").innerText = "Speed: " + speed.toFixed(1);
  document.getElementById("alt").innerText = "Altitude: " + Math.floor(window.innerHeight - y);
  document.getElementById("fuel").innerText = "Fuel: " + Math.floor(fuel) + "%";
  document.getElementById("dist").innerText = "Distance: " + Math.floor(distance) + "m";

  requestAnimationFrame(gameLoop);
}

/* END GAME */
function endGame(message) {
  gameRunning = false;
  document.getElementById("gameOver").style.display = "block";
  document.getElementById("msg").innerText = message;
}

/* RESTART */
function restart() {
  location.reload();
}

gameLoop();
</script>

</body>
</html>
